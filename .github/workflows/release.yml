name: Release Package (OpenWrt 23.05)

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison gawk gettext \
            git libncurses5-dev libssl-dev rsync unzip zlib1g-dev zstd xz-utils python3-setuptools python3

      - name: Download & Extract OpenWrt 23.05 SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/23.05.6/targets/ramips/mt7621/openwrt-sdk-23.05.6-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          
          echo "Downloading SDK from $SDK_URL"
          wget -O sdk.tar.xz "$SDK_URL"
          tar -xf sdk.tar.xz
          rm -f sdk.tar.xz
          mv openwrt-sdk-* openwrt-sdk

      - name: Setup RTL8812EU Package & Build
        run: |
          cd openwrt-sdk
          
          # 1. Sử dụng mã nguồn driver ổn định hơn từ morrownr hoặc kiler129 (hoặc clone trực tiếp repo chuẩn hỗ trợ OpenWrt)
          mkdir -p package/rtl8812eu
          git clone --depth 1 https://github.com/lwfinger/rtl8812au.git package/rtl8812eu/src || \
          git clone --depth 1 https://github.com/aircrack-ng/rtl8812au.git package/rtl8812eu/src

          # 2. Tạo OpenWrt Package Makefile chuẩn tương thích tuyệt đối với SDK 23.05
          cat << 'EOF' > package/rtl8812eu/Makefile
          include $(TOPDIR)/rules.mk

          PKG_NAME:=rtl8812eu
          PKG_RELEASE:=1

          include $(INCLUDE_DIR)/kernel.mk
          include $(INCLUDE_DIR)/package.mk

          define KernelPackage/rtl8812eu
            SUBMENU:=Wireless Drivers
            TITLE:=Realtek RTL8812EU/8812AU Wireless Driver
            FILES:=$(PKG_BUILD_DIR)/8812au.ko
            AUTOLOAD:=$(call AutoProbe,8812au)
            DEPENDS:=+kmod-cfg80211
          endef

          define KernelPackage/rtl8812eu/description
            Kernel module driver for Realtek RTL8812EU/8812AU USB Wi-Fi adapters.
          endef

          define Build/Prepare
          	mkdir -p $(PKG_BUILD_DIR)
          	cp -r $(TOPDIR)/package/rtl8812eu/src/* $(PKG_BUILD_DIR)/
          endef

          define Build/Compile
          	+$(MAKE) $(PKG_JOBS) -C "$(LINUX_DIR)" \
          		ARCH="$(LINUX_KARCH)" \
          		CROSS_COMPILE="$(TARGET_CROSS)" \
          		M="$(PKG_BUILD_DIR)" \
          		EXTRA_CFLAGS="-w -Wno-error" \
          		modules
          endef

          $(eval $(call KernelPackage,rtl8812eu))
          EOF

          # 3. Xóa cache và cấu hình biên dịch
          rm -rf tmp
          echo "CONFIG_PACKAGE_kmod-rtl8812eu=m" >> .config
          make defconfig

          # 4. Tiến hành biên dịch gói kmod
          make package/rtl8812eu/compile V=s

          # 5. Gom file `.ipk` vào thư mục release_assets
          mkdir -p ../release_assets
          find bin/packages/ -type f -name "*rtl8812eu*.ipk" -o -name "*rtl8812au*.ipk" -exec cp {} ../release_assets/ \;
          
          echo "=== Compiled Assets ==="
          ls -la ../release_assets/

      - name: Upload Package to Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
