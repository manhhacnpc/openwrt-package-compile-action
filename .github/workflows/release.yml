name: Release Package

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison gawk gettext \
            git libncurses5-dev libssl-dev rsync unzip zlib1g-dev zstd xz-utils python3-setuptools

      - name: Download & Extract OpenWrt SDK
        run: |
          # 1. Tự động lấy tên file SDK mới nhất trong mục Snapshots của MT7621
          SDK_FILENAME=$(curl -s https://downloads.openwrt.org/snapshots/targets/ramips/mt7621/ | grep -o 'openwrt-sdk-ramips-mt7621_[^"]*tar.xz' | head -n 1)
          echo "Found SDK: $SDK_FILENAME"
          
          # 2. Tải SDK về máy chủ
          wget -O sdk.tar.xz "https://downloads.openwrt.org/snapshots/targets/ramips/mt7621/$SDK_FILENAME"
          
          # 3. Giải nén SDK
          tar -xf sdk.tar.xz
          rm sdk.tar.xz
          
          # 4. Đổi tên thư mục SDK cho gọn
          mv openwrt-sdk-* openwrt-sdk

      - name: Build RTL8812EU Package
        run: |
          cd openwrt-sdk
          
          # Clone driver rtl8812eu vào thư mục package
          git clone https://github.com/svpcom/rtl8812eu-openwrt.git package/rtl8812eu
          
          # Cập nhật feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Cấu hình và compile package kmod-rtl8812eu
          echo "CONFIG_PACKAGE_kmod-rtl8812eu=m" > .config
          make defconfig
          make package/rtl8812eu/compile V=s -j$(nproc)

      - name: Upload Package to Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            openwrt-sdk/bin/packages/**/kmod-rtl8812eu*.apk
            openwrt-sdk/bin/targets/**/kmod-rtl8812eu*.apk
            openwrt-sdk/bin/packages/**/kmod-rtl8812eu*.ipk
            openwrt-sdk/bin/targets/**/kmod-rtl8812eu*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
