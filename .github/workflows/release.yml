name: Release Package (OpenWrt 23.05)

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison gawk gettext \
            git libncurses5-dev libssl-dev rsync unzip zlib1g-dev zstd xz-utils python3-setuptools python3

      - name: Download & Extract OpenWrt 23.05 SDK
        run: |
          # Sử dụng trực tiếp SDK phiên bản ổn định 23.05.6 cho ramips/mt7621
          SDK_URL="https://downloads.openwrt.org/releases/23.05.6/targets/ramips/mt7621/openwrt-sdk-23.05.6-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          
          echo "Downloading SDK from $SDK_URL"
          wget -O sdk.tar.xz "$SDK_URL"
          tar -xf sdk.tar.xz
          rm -f sdk.tar.xz
          mv openwrt-sdk-* openwrt-sdk

      - name: Setup RTL8812EU Package & Build
        run: |
          cd openwrt-sdk
          
          # 1. Clone mã nguồn driver svpcom/rtl8812eu
          mkdir -p package/rtl8812eu
          git clone --depth 1 https://github.com/svpcom/rtl8812eu.git package/rtl8812eu/src

          # 2. Vá Makefile của driver để tương thích với cấu trúc biên dịch module ngoài
          cd package/rtl8812eu/src
          sed -i 's/ifeq ($(CONFIG_RTL8812EU), y)/ifneq ($(CONFIG_RTL8812EU), n)/g' Makefile
          sed -i 's/obj-\$(CONFIG_RTL8812EU) :=/obj-m :=/g' Makefile
          sed -i 's/obj-\$(CONFIG_RTL8812EU) +=/obj-m +=/g' Makefile
          sed -i 's/obj-y :=/obj-m :=/g' Makefile
          sed -i 's/obj-y +=/obj-m +=/g' Makefile
          echo "obj-m := 8812eu.o" >> Makefile
          cd ../../..

          # 3. Tạo OpenWrt Package Makefile chuẩn cho bản 23.05
          cat << 'EOF' > package/rtl8812eu/Makefile
          include $(TOPDIR)/rules.mk

          PKG_NAME:=rtl8812eu
          PKG_RELEASE:=1

          include $(INCLUDE_DIR)/kernel.mk
          include $(INCLUDE_DIR)/package.mk

          define KernelPackage/rtl8812eu
            SUBMENU:=Wireless Drivers
            TITLE:=Realtek RTL8812EU Wireless Driver
            FILES:=$(PKG_BUILD_DIR)/8812eu.ko
            AUTOLOAD:=$(call AutoProbe,8812eu)
            DEPENDS:=+kmod-cfg80211
          endef

          define KernelPackage/rtl8812eu/description
            Kernel module driver for Realtek RTL8812EU USB Wi-Fi adapters.
          endef

          define Build/Prepare
          	mkdir -p $(PKG_BUILD_DIR)
          	cp -r $(TOPDIR)/package/rtl8812eu/src/* $(PKG_BUILD_DIR)/
          endef

          define Build/Compile
          	$(MAKE) -C "$(LINUX_DIR)" \
          		ARCH="$(LINUX_KARCH)" \
          		CROSS_COMPILE="$(TARGET_CROSS)" \
          		M="$(PKG_BUILD_DIR)" \
          		KCFLAGS="-w -DCONFIG_LITTLE_ENDIAN" \
          		EXTRA_CFLAGS="-w -DCONFIG_LITTLE_ENDIAN" \
          		modules
          endef

          $(eval $(call KernelPackage,rtl8812eu))
          EOF

          # 4. Xóa cache và thiết lập cấu hình gói kmod
          rm -rf tmp
          echo "CONFIG_PACKAGE_kmod-rtl8812eu=m" >> .config
          make defconfig

          # 5. Tiến hành biên dịch gói kmod-rtl8812eu
          make package/rtl8812eu/compile V=s -j$(nproc)

          # 6. Gom file `.ipk` vào thư mục release_assets
          mkdir -p ../release_assets
          find bin/packages/ -type f -name "*rtl8812eu*.ipk" -exec cp {} ../release_assets/ \;
          
          echo "=== Compiled Assets ==="
          ls -la ../release_assets/

      - name: Upload Package to Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
