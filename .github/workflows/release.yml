name: Release Package

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison gawk gettext \
            git libncurses5-dev libssl-dev rsync unzip zlib1g-dev zstd xz-utils python3-setuptools

      - name: Download & Extract OpenWrt SDK
        run: |
          # 1. Tải sha256sums để lấy tên SDK
          wget -q https://downloads.openwrt.org/snapshots/targets/ramips/mt7621/sha256sums -O sha256sums || true
          
          SDK_FILENAME=$(awk '/openwrt-sdk/ {print $2}' sha256sums | sed 's/\*//' | head -n 1)
          
          if [ -z "$SDK_FILENAME" ]; then
            SDK_FILENAME=$(curl -sL https://downloads.openwrt.org/snapshots/targets/ramips/mt7621/ | grep -oE 'openwrt-sdk-[^"]+\.tar\.xz' | head -n 1)
          fi

          echo "Found exact SDK file: $SDK_FILENAME"
          
          # 2. Tải & giải nén SDK
          wget -O sdk.tar.xz "https://downloads.openwrt.org/snapshots/targets/ramips/mt7621/$SDK_FILENAME"
          tar -xf sdk.tar.xz
          rm -f sdk.tar.xz sha256sums
          mv openwrt-sdk-* openwrt-sdk

      - name: Setup RTL8812EU Package & Build
        run: |
          cd openwrt-sdk
          
          # 1. Tải trực tiếp package repo đã có sẵn Makefile chuẩn cho rtl8812eu
          # Dùng curl + tar giải nén để tránh hoàn toàn lỗi git authentication
          mkdir -p package/rtl8812eu
          curl -sSL https://github.com/morytyann/OpenWrt-RTL8812EU/archive/refs/heads/main.tar.gz | tar -xz -C package/rtl8812eu --strip-components=1

          # 2. Cấu hình chọn gói kmod-rtl8812eu
          echo "CONFIG_PACKAGE_kmod-rtl8812eu=m" >> .config
          make defconfig
          
          # 3. Tiến hành biên dịch gói driver
          make package/rtl8812eu/compile V=s -j$(nproc)

      - name: Upload Package to Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            openwrt-sdk/bin/packages/**/kmod-rtl8812eu*.apk
            openwrt-sdk/bin/targets/**/kmod-rtl8812eu*.apk
            openwrt-sdk/bin/packages/**/kmod-rtl8812eu*.ipk
            openwrt-sdk/bin/targets/**/kmod-rtl8812eu*.ipk
            openwrt-sdk/bin/packages/**/rtl8812eu*.apk
            openwrt-sdk/bin/targets/**/rtl8812eu*.apk
            openwrt-sdk/bin/packages/**/rtl8812eu*.ipk
            openwrt-sdk/bin/targets/**/rtl8812eu*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
