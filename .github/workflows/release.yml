name: Release Package

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison gawk gettext \
            git libncurses5-dev libssl-dev rsync unzip zlib1g-dev zstd xz-utils python3-setuptools python3

      - name: Download & Extract OpenWrt SDK
        run: |
          # 1. Tải sha256sums để lấy tên SDK
          wget -q https://downloads.openwrt.org/snapshots/targets/ramips/mt7621/sha256sums -O sha256sums || true
          
          SDK_FILENAME=$(awk '/openwrt-sdk/ {print $2}' sha256sums | sed 's/\*//' | head -n 1)
          
          if [ -z "$SDK_FILENAME" ]; then
            SDK_FILENAME=$(curl -sL https://downloads.openwrt.org/snapshots/targets/ramips/mt7621/ | grep -oE 'openwrt-sdk-[^"]+\.tar\.xz' | head -n 1)
          fi

          echo "Found exact SDK file: $SDK_FILENAME"
          
          # 2. Tải & giải nén SDK
          wget -O sdk.tar.xz "https://downloads.openwrt.org/snapshots/targets/ramips/mt7621/$SDK_FILENAME"
          tar -xf sdk.tar.xz
          rm -f sdk.tar.xz sha256sums
          mv openwrt-sdk-* openwrt-sdk

      - name: Setup RTL8812EU Package & Build
        run: |
          cd openwrt-sdk
          
          # 1. Clone driver chính chủ svpcom/rtl8812eu (Public Repo)
          git clone --depth 1 https://github.com/svpcom/rtl8812eu.git package/rtl8812eu/src

          # 2. Tạo Makefile bằng Python để giữ nguyên dấu \t (TAB) chuẩn Make
          python3 -c '
          makefile_content = """include $(TOPDIR)/rules.mk

          PKG_NAME:=rtl8812eu
          PKG_VERSION:=5.15.0.1
          PKG_RELEASE:=1

          include $(INCLUDE_DIR)/kernel.mk

          define KernelPackage/rtl8812eu
            SUBMENU:=Wireless Drivers
            TITLE:=Realtek RTL8812EU Wireless Driver
            FILES:=$(PKG_BUILD_DIR)/rtl8812eu.ko
            AUTOLOAD:=$(call AutoProbe,rtl8812eu)
            DEPENDS:=+kmod-cfg80211
          endef

          define KernelPackage/rtl8812eu/description
            Kernel module driver for Realtek RTL8812EU USB Wi-Fi adapters.
          endef

          MAKE_OPTS:= \\
          \tARCH="$(LINUX_KARCH)" \\
          \tCROSS_COMPILE="$(TARGET_CROSS)" \\
          \tM="$(PKG_BUILD_DIR)" \\
          \tUSER_EXTRA_CFLAGS="-DCONFIG_LITTLE_ENDIAN -Wno-error=date-time" \\
          \tCONFIG_RTL8812EU=m

          define Build/Prepare
          \tmkdir -p $(PKG_BUILD_DIR)
          \tcp -r ./src/* $(PKG_BUILD_DIR)/
          endef

          define Build/Compile
          \t$(MAKE) -C "$(LINUX_DIR)" $(MAKE_OPTS) modules
          endef

          $(eval $(call KernelPackage,rtl8812eu))
          """
          with open("package/rtl8812eu/Makefile", "w") as f:
              f.write(makefile_content)
          '

          # 3. Cấu hình chọn gói kmod-rtl8812eu vào .config
          echo "CONFIG_PACKAGE_kmod-rtl8812eu=m" >> .config
          make defconfig
          
          # 4. Tiến hành biên dịch
          make package/rtl8812eu/compile V=s -j$(nproc)

      - name: Upload Package to Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            openwrt-sdk/bin/packages/**/kmod-rtl8812eu*.apk
            openwrt-sdk/bin/targets/**/kmod-rtl8812eu*.apk
            openwrt-sdk/bin/packages/**/kmod-rtl8812eu*.ipk
            openwrt-sdk/bin/targets/**/kmod-rtl8812eu*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
