name: Release Package

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison gawk gettext \
            git libncurses5-dev libssl-dev rsync unzip zlib1g-dev zstd xz-utils python3-setuptools python3

      - name: Download & Extract OpenWrt SDK
        run: |
          # 1. Tải sha256sums để lấy tên SDK
          wget -q https://downloads.openwrt.org/snapshots/targets/ramips/mt7621/sha256sums -O sha256sums || true
          
          SDK_FILENAME=$(awk '/openwrt-sdk/ {print $2}' sha256sums | sed 's/\*//' | head -n 1)
          
          if [ -z "$SDK_FILENAME" ]; then
            SDK_FILENAME=$(curl -sL https://downloads.openwrt.org/snapshots/targets/ramips/mt7621/ | grep -oE 'openwrt-sdk-[^"]+\.tar\.xz' | head -n 1)
          fi

          echo "Found exact SDK file: $SDK_FILENAME"
          
          # 2. Tải & giải nén SDK
          wget -O sdk.tar.xz "https://downloads.openwrt.org/snapshots/targets/ramips/mt7621/$SDK_FILENAME"
          tar -xf sdk.tar.xz
          rm -f sdk.tar.xz sha256sums
          mv openwrt-sdk-* openwrt-sdk

      - name: Setup RTL8812EU Package & Build
        run: |
          cd openwrt-sdk
          
          # 1. Clone mã nguồn driver svpcom/rtl8812eu
          mkdir -p package/rtl8812eu
          git clone --depth 1 https://github.com/svpcom/rtl8812eu.git package/rtl8812eu/src

          # 2. Sửa trực tiếp Makefile driver bằng Bash (Chuyển obj-y/obj-$(CONFIG_RTL8812EU) thành obj-m)
          sed -i 's/obj-\$(CONFIG_RTL8812EU)/obj-m/g' package/rtl8812eu/src/Makefile
          sed -i 's/obj-y :=/obj-m :=/g' package/rtl8812eu/src/Makefile

          # 3. Tạo OpenWrt Package Makefile chuẩn
          cat << 'EOF' > package/rtl8812eu/Makefile
          include $(TOPDIR)/rules.mk

          PKG_NAME:=rtl8812eu
          PKG_RELEASE:=1

          include $(INCLUDE_DIR)/kernel.mk
          include $(INCLUDE_DIR)/package.mk

          define KernelPackage/rtl8812eu
            SUBMENU:=Wireless Drivers
            TITLE:=Realtek RTL8812EU Wireless Driver
            FILES:=$(PKG_BUILD_DIR)/8812eu.ko
            AUTOLOAD:=$(call AutoProbe,8812eu)
            DEPENDS:=+kmod-cfg80211
          endef

          define KernelPackage/rtl8812eu/description
            Kernel module driver for Realtek RTL8812EU USB Wi-Fi adapters.
          endef

          define Build/Prepare
          	mkdir -p $(PKG_BUILD_DIR)
          	cp -r $(TOPDIR)/package/rtl8812eu/src/* $(PKG_BUILD_DIR)/
          endef

          define Build/Compile
          	$(MAKE) -C "$(LINUX_DIR)" \
          		ARCH="$(LINUX_KARCH)" \
          		CROSS_COMPILE="$(TARGET_CROSS)" \
          		M="$(PKG_BUILD_DIR)" \
          		KCFLAGS="-w -DCONFIG_LITTLE_ENDIAN" \
          		EXTRA_CFLAGS="-w -DCONFIG_LITTLE_ENDIAN" \
          		USER_EXTRA_CFLAGS="-w -DCONFIG_LITTLE_ENDIAN" \
          		modules
          endef

          $(eval $(call KernelPackage,rtl8812eu))
          EOF

          # 4. Xóa cache tmp để SDK nhận diện lại package
          rm -rf tmp

          # 5. Kích hoạt gói kmod-rtl8812eu trong cấu hình
          echo "CONFIG_PACKAGE_kmod-rtl8812eu=m" >> .config
          make defconfig

          # 6. Biên dịch gói kmod-rtl8812eu
          make package/rtl8812eu/compile V=s -j$(nproc)

          # 7. Gom đúng file gói rtl8812eu sang thư mục release_assets
          mkdir -p ../release_assets
          find bin/ -type f \( -name "*rtl8812eu*.apk" -o -name "*rtl8812eu*.ipk" \) -exec cp {} ../release_assets/ \;
          
          echo "=== Compiled Assets ==="
          ls -la ../release_assets/

      - name: Upload Package to Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
