name: Release Package

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  release-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate and update release notes
        uses: nooblk-98/copilot-release-notes-action@v1.1.5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          copilot_model: gpt-4o
          tag_name: ${{ github.event.release.tag_name }}
          target_commitish: ${{ github.event.release.target_commitish }}

  build-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build OpenWrt Package
        uses: manhhacnpc/openwrt-package-compile-action@main
        with:
          # 1. Source code driver RTL8812EU hỗ trợ Monitor Mode
          pkgdir: 'https://github.com/svpcom/rtl8812eu-openwrt.git'
          
          # 2. Tên package cần build
          target_pkg: 'kmod-rtl8812eu'
          
          # 3. SDK URL - Thay link SDK khớp với chip/kernel router của bạn
          sdk_url: 'https://downloads.openwrt.org/snapshots/targets/ramips/mt7621/openwrt-sdk-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.xz'

      - name: Upload Package to Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: bin/packages/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
