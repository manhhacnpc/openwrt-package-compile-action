name: Release Package

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build OpenWrt Package
        uses: manhhacnpc/openwrt-package-compile-action@main
        with:
          package-name: 'kmod-rtl8812eu'
          package-dir: 'https://github.com/svpcom/rtl8812eu-openwrt.git'
          sdk-url-override: 'https://downloads.openwrt.org/snapshots/targets/ramips/mt7621/openwrt-sdk-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.xz'

      - name: Upload Package to Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: bin/packages/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
